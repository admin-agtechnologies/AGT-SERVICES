services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: agt_users_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agt_users_db
      POSTGRES_USER: users_user
      POSTGRES_PASSWORD: users_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U users_user -d agt_users_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agt_network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agt_users_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agt_network

  # ── Users Service (production) ─────────────────────────────────────────────
  users:
    build:
      context: .
      target: production
    container_name: agt_users_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://users_user:users_password@agt_users_db:5432/agt_users_db
      REDIS_URL: redis://agt_users_redis:6379/1
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "7001:7001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7001/api/v1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agt_network

  # ── Users Service (dev — hot reload) ───────────────────────────────────────
  users-dev:
    build:
      context: .
      target: builder
    container_name: agt_users_dev
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:7001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://users_user:users_password@agt_users_db:5432/agt_users_db
      REDIS_URL: redis://agt_users_redis:6379/1
      DEBUG: "True"
      DJANGO_SETTINGS_MODULE: config.settings
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - .:/app
      - ./keys:/app/keys:ro
    ports:
      - "7001:7001"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - agt_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agt_network:
    external: true
    name: agt_network