services:
  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: agt_auth_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agt_auth_db
      POSTGRES_USER: agt_user
      POSTGRES_PASSWORD: agt_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agt_user -d agt_auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agt_network

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agt_auth_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agt_network

  # ── Auth Service (production) ──────────────────────────────────────────────
  auth:
    build:
      context: .
      target: production
    container_name: agt_auth_service
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agt_user:agt_password@agt_auth_db:5432/agt_auth_db # Mis à jour agt_auth_db
      REDIS_URL: redis://agt_auth_redis:6379/0 # Mis à jour agt_auth_redis
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7000/api/v1/auth/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - agt_network

  # ── Auth Service (dev — hot reload) ────────────────────────────────────────
  auth-dev:
    build:
      context: .
      target: builder
    container_name: agt_auth_dev
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:7000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://agt_user:agt_password@agt_auth_db:5432/agt_auth_db # Mis à jour agt_auth_db
      REDIS_URL: redis://agt_auth_redis:6379/0 # Mis à jour agt_auth_redis
      DEBUG: "True"
      JWT_PRIVATE_KEY_PATH: /app/keys/private.pem
      JWT_PUBLIC_KEY_PATH: /app/keys/public.pem
      DJANGO_SETTINGS_MODULE: config.settings
    volumes:
      - .:/app
      - ./keys:/app/keys:ro
    ports:
      - "7000:7000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev
    networks:
      - agt_network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  agt_network:
    external: true
    name: agt_network