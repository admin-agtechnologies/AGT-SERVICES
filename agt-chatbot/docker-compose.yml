services:
  db:
    image: postgres:15-alpine
    container_name: agt_chatbot_db
    environment:
      POSTGRES_DB: agt_chatbot_db
      POSTGRES_USER: chatbot_user
      POSTGRES_PASSWORD: chatbot_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5440:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot_user -d agt_chatbot_db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: agt_chatbot_redis
    volumes:
      - redis_data:/data
    ports:
      - "6387:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  chatbot:
    build:
      context: .
      target: production
    container_name: agt_chatbot_service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chatbot_user:chatbot_password@db:5432/agt_chatbot_db
      REDIS_URL: redis://redis:6379/8
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "7010:7010"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7010/api/v1/chatbot/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  chatbot-dev:
    build:
      context: .
      target: builder
    container_name: agt_chatbot_dev
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:7010"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://chatbot_user:chatbot_password@db:5432/agt_chatbot_db
      REDIS_URL: redis://redis:6379/8
      DEBUG: "True"
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - .:/app
      - ./keys:/app/keys:ro
    ports:
      - "7010:7010"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - dev
volumes:
  postgres_data:
  redis_data:
