# ============================================================
# AG TECHNOLOGIES — Infrastructure partagée
# Usage : docker compose -f docker-compose.infra.yml up -d
#
# Contient les services d'infrastructure communs à tout l'écosystème :
#   - Gateway  : point d'entrée HTTP unique (Nginx)
#   - RabbitMQ : message broker pour la communication asynchrone
#   - Mailpit  : serveur SMTP local pour intercepter les emails en dev
#
# NOTE — Elasticsearch :
#   ES n'est PAS dans l'infra partagée car seul le service Search l'utilise.
#   Search gère son propre ES dans son docker-compose.yml.
#   En production, ES serait remplacé par Elastic Cloud.
#
# Chaque microservice a son propre docker-compose.yml pour sa DB et son Redis.
# ============================================================

services:
  # ── API Gateway (Nginx reverse proxy) ────────────────────────────────────
  # Point d'entrée unique — route /api/v1/<service>/... vers le bon container.
  # Voir gateway/nginx.conf pour les règles de routing.
  gateway:
    image: nginx:alpine
    container_name: agt-gateway
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rabbitmq
    networks:
      - agt_network

  # ── RabbitMQ (Message Broker partagé) ────────────────────────────────────
  # Utilisé par : Notification (envoi email/SMS), Subscription, Payment, Wallet.
  # Interface de monitoring : http://localhost:15672 (agt_rabbit / agt_rabbit_password)
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: agt-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agt_rabbit
      RABBITMQ_DEFAULT_PASS: agt_rabbit_password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - agt_network

  # ── Mailpit (SMTP local pour dev) ────────────────────────────────────────
  # Intercepte tous les emails envoyés par les services en développement.
  # Interface web : http://localhost:8025
  # SMTP : localhost:1025 (configuré dans les .env des services)
  mailpit:
    image: axllent/mailpit
    container_name: agt-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8025",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - agt_network

volumes:
  rabbitmq_data:
    driver: local

networks:
  agt_network:
    external: true
