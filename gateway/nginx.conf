# ============================================================
# AG TECHNOLOGIES — API Gateway (Nginx)
# Reverse proxy unifié pour tout l'écosystème.
#
# RÉSOLUTION DNS DYNAMIQUE :
# resolver 127.0.0.11 = DNS interne Docker. Force la résolution
# à la volée plutôt qu'au démarrage. Un service absent retourne
# 502, pas un crash Nginx.
#
# PROXY_PASS AVEC VARIABLE :
# proxy_pass http://$svc$request_uri transmet l'URI complète
# (chemin + query string) telle qu'envoyée par le client.
# ============================================================

events {
    worker_connections 1024;
}

http {
    # DNS interne Docker — résolution dynamique à chaque requête
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ── Logging ─────────────────────────────────────────────
    log_format json_log escape=json '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"upstream":"$upstream_addr",'
        '"response_time":$request_time'
    '}';
    access_log /var/log/nginx/access.log json_log;

    # ── Rate limiting ───────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;

    # ── CORS ────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "~^https?://localhost(:[0-9]+)?$" "$http_origin";
        "~^https?://.*\.agt\.com$" "$http_origin";
    }

    server {
        listen 80;
        server_name localhost;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-Platform-Id, X-Admin-API-Key, X-Requested-With" always;
        add_header Access-Control-Allow-Credentials "true" always;

        if ($request_method = OPTIONS) { return 204; }

        limit_req zone=global burst=20 nodelay;

        # ── Health gateway (ce endpoint répond sans dépendance) ─
        location = /health {
            return 200 '{"status":"gateway_ok"}';
            add_header Content-Type application/json;
        }

        # ── Health checks dédiés par service ────────────────
        # Users et Notification exposent /api/v1/health (sans préfixe
        # métier). On crée des endpoints gateway explicites pour eux.
        location = /api/v1/users/health {
            set $svc agt-users-service:7001;
            proxy_pass http://$svc/api/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location = /api/v1/notifications/health {
            set $svc agt-notif-service:7002;
            proxy_pass http://$svc/api/v1/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Auth (7000) ─────────────────────────────────────
        location /api/v1/auth/ {
            set $svc agt-auth-service:7000;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Users (7001) ────────────────────────────────────
        location /api/v1/users {
            set $svc agt-users-service:7001;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/platforms/ {
            set $svc agt-users-service:7001;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Notification (7002) ─────────────────────────────
        location /api/v1/notifications/ {
            set $svc agt-notif-service:7002;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/templates/ {
            set $svc agt-notif-service:7002;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/campaigns/ {
            set $svc agt-notif-service:7002;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Media (7003) ────────────────────────────────────
        location /api/v1/media/ {
            set $svc agt-media-service:7003;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            client_max_body_size 100M;
        }

        # ── Subscription (7004) ─────────────────────────────
        location /api/v1/subscriptions/ {
            set $svc agt-sub-service:7004;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/plans/ {
            set $svc agt-sub-service:7004;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/quotas/ {
            set $svc agt-sub-service:7004;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Payment (7005) ──────────────────────────────────
        location /api/v1/payments/ {
            set $svc agt-pay-service:7005;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Wallet (7006) ───────────────────────────────────
        location /api/v1/wallets/ {
            set $svc agt-wallet-service:7006;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Search (7007) ───────────────────────────────────
        location /api/v1/search/ {
            set $svc agt-search-service:7007;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/indexes/ {
            set $svc agt-search-service:7007;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # ── Chat (7008) ─────────────────────────────────────
        location /api/v1/chat/ {
            set $svc agt-chat-service:7008;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /socket.io/ {
            set $svc agt-chat-service:7008;
            proxy_pass http://$svc$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Geoloc (7009) ───────────────────────────────────
        location /api/v1/geoloc/ {
            set $svc agt-geoloc-service:7009;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /geoloc/socket.io/ {
            set $svc agt-geoloc-service:7009;
            proxy_pass http://$svc$request_uri;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Chatbot (7010) ──────────────────────────────────
        location /api/v1/chatbot/ {
            set $svc agt-chatbot-service:7010;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /api/v1/bots/ {
            set $svc agt-chatbot-service:7010;
            proxy_pass http://$svc$request_uri;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}