services:
  db:
    image: postgres:15-alpine
    container_name: agt-wallet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agt-wallet-db
      POSTGRES_USER: wallet_user
      POSTGRES_PASSWORD: wallet_password
    volumes:
    - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U wallet_user -d agt-wallet-db
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: agt-wallet-redis
    restart: unless-stopped
    volumes:
    - redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
  wallet:
    build:
      context: .
      target: production
    container_name: agt-wallet-service
    restart: unless-stopped
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql://wallet_user:wallet_password@db:5432/agt-wallet-db
      REDIS_URL: redis://redis:6379/6
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
    - ./keys:/app/keys:ro
    ports:
    - 7006:7006
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - curl -f http://localhost:7006/api/v1/wallet/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  wallet-dev:
    build:
      context: .
      target: builder
    container_name: agt-wallet-dev
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver
      0.0.0.0:7006"
    env_file:
    - .env
    environment:
      DATABASE_URL: postgresql://wallet_user:wallet_password@db:5432/agt-wallet-db
      REDIS_URL: redis://redis:6379/6
      DEBUG: 'True'
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
    - .:/app
    - ./keys:/app/keys:ro
    ports:
    - 7006:7006
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
    - dev
volumes:
  postgres_data: null
  redis_data: null
