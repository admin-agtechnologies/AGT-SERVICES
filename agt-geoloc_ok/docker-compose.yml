services:
  agt-geoloc-db:
    image: postgis/postgis:15-3.4-alpine
    container_name: agt-geoloc-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agt_geoloc_db
      POSTGRES_USER: geoloc_user
      POSTGRES_PASSWORD: geoloc_password
    volumes:
    - geoloc_postgres_data:/var/lib/postgresql/data
    - ./scripts/init-postgis.sql:/docker-entrypoint-initdb.d/init-postgis.sql
    healthcheck:
      test:
      - CMD-SHELL
      - pg_isready -U geoloc_user -d agt_geoloc_db
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - agt_geoloc_network
  agt-geoloc-redis:
    image: redis:7-alpine
    container_name: agt-geoloc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
    - geoloc_redis_data:/data
    healthcheck:
      test:
      - CMD
      - redis-cli
      - ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
    - agt_geoloc_network
  agt-geoloc-rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: agt-geoloc-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: agt_rabbit
      RABBITMQ_DEFAULT_PASS: agt_rabbit_password
    ports:
    - 5675:5672
    - 15675:15672
    healthcheck:
      test:
      - CMD
      - rabbitmq-diagnostics
      - ping
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
    - agt_geoloc_network
  agt-geoloc:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agt-geoloc-service
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      PORT: 7009
      DB_HOST: agt-geoloc-db
      DB_PORT: 5432
      DB_NAME: agt_geoloc_db
      DB_USER: geoloc_user
      DB_PASSWORD: geoloc_password
      REDIS_HOST: agt-geoloc-redis
      REDIS_PORT: 6379
      RABBITMQ_URL: amqp://agt_rabbit:agt_rabbit_password@agt-geoloc-rabbitmq:5672
    ports:
    - 7009:7009
    depends_on:
      agt-geoloc-db:
        condition: service_healthy
      agt-geoloc-redis:
        condition: service_healthy
      agt-geoloc-rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
      - CMD-SHELL
      - wget -qO- http://localhost:7009/api/v1/geo/health || exit 1
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    networks:
    - agt_geoloc_network
volumes:
  geoloc_postgres_data: null
  geoloc_redis_data: null
networks:
  agt_geoloc_network:
    driver: bridge
