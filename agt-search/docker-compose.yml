services:
  db:
    image: postgres:15-alpine
    container_name: agt-search-db
    environment:
      POSTGRES_DB: agt-search-db
      POSTGRES_USER: search_user
      POSTGRES_PASSWORD: search_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5438:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U search_user -d agt-search-db"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: agt-search-redis
    volumes:
      - redis_data:/data
    ports:
      - "6385:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: agt_search_es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
  search:
    build:
      context: .
      target: production
    container_name: agt-search-service
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://search_user:search_password@db:5432/agt-search-db
      REDIS_URL: redis://redis:6379/7
      ELASTICSEARCH_URL: http://elasticsearch:9200
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - ./keys:/app/keys:ro
    ports:
      - "7007:7007"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:7007/api/v1/search/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
  search-dev:
    build:
      context: .
      target: builder
    container_name: agt-search-dev
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:7007"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://search_user:search_password@db:5432/agt-search-db
      REDIS_URL: redis://redis:6379/7
      ELASTICSEARCH_URL: http://elasticsearch:9200
      DEBUG: "True"
      AUTH_SERVICE_PUBLIC_KEY_PATH: /app/keys/auth_public.pem
    volumes:
      - .:/app
      - ./keys:/app/keys:ro
    ports:
      - "7007:7007"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    profiles:
      - dev
volumes:
  postgres_data:
  redis_data:
  es_data:
